name: Recovery Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 cpio
          
          # This is the "Smart Fix" for the ncurses error
          # It tries to download the file, and if it fails, it just continues instead of crashing
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.4-7ubuntu1_amd64.deb || \
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.2-0ubuntu2_amd64.deb || true
          
          # Only try to install if the file was actually downloaded
          sudo apt install ./libncurses5*.deb || echo "Warning: libncurses5 could not be installed, but trying to continue..."

      - name: Set up Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo cp ~/bin/repo /usr/bin/repo

      - name: Sync Minimal TWRP Manifest
        run: |
          mkdir ~/twrp
          cd ~/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Setup Device Tree
        run: |
          cd ~/twrp
          # We are changing the folder name to lowercase 'x659b' to match your TARGET_DEVICE
          mkdir -p device/infinix/x659b
          cp -rv $GITHUB_WORKSPACE/* device/infinix/x659b/

      - name: Build Recovery
        run: |
          cd ~/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh
          # Using the simplified name we just set up
          lunch omni_x659b-eng
          mka bootimage

      - name: Upload Build Folder (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: Build-Output-Check
          # This tells GitHub to grab everything in the output folder
          # so we can see exactly what was created.
          path: /home/runner/twrp/out/target/product/x659b/*.img    
      
